<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Filter pre intenzívnu žiaru jadra -->
    <filter id="coreGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <!-- Metalický prechod pre šasi -->
    <linearGradient id="chassisGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#475569" />
      <stop offset="45%" style="stop-color:#1e293b" />
      <stop offset="100%" style="stop-color:#0f172a" />
    </linearGradient>

    <!-- Prechod pre rozžeravené cievky -->
    <linearGradient id="coilGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316" />
      <stop offset="50%" style="stop-color:#fbbf24" />
      <stop offset="100%" style="stop-color:#ea580c" />
    </linearGradient>
  </defs>

  <!-- Zadné energetické stabilizátory a potrubia -->
  <path d="M22 45V25H38M78 45V25H62" stroke="#334155" stroke-width="4" stroke-linecap="round"/>
  <rect x="34" y="20" width="8" height="10" rx="1.5" fill="#475569"/>
  <rect x="58" y="20" width="8" height="10" rx="1.5" fill="#475569"/>

  <!-- Hlavné priemyselné šasi -->
  <path d="M10 80L50 96L90 80V35L50 16L10 35V80Z" fill="url(#chassisGrad)" stroke="#334155" stroke-width="2"/>
  <path d="M16 76L50 90L84 76V38L50 24L16 38V76Z" fill="#0f172a" stroke="#475569" stroke-width="1.2"/>

  <!-- Vnútorné delenie panelov pre technický vzhľad -->
  <path d="M16 38L50 52L84 38M50 52V90" stroke="#334155" stroke-width="1" stroke-opacity="0.5"/>

  <!-- Bočné chladiace moduly (Heat Sinks) -->
  <g id="cooling_vents">
    <rect x="6" y="48" width="10" height="22" rx="2" fill="#1e293b" stroke="#334155" stroke-width="0.8"/>
    <path d="M6 52H16M6 56H16M6 60H16M6 64H16" stroke="#0f172a" stroke-width="1.2"/>
    <rect x="84" y="48" width="10" height="22" rx="2" fill="#1e293b" stroke="#334155" stroke-width="0.8"/>
    <path d="M84 52H94M84 56H94M84 60H94M84 64H94" stroke="#0f172a" stroke-width="1.2"/>
  </g>

  <!-- Termálna reakčná komora (Sklenený valec) -->
  <rect x="38" y="30" width="24" height="48" rx="6" fill="#020617" stroke="#92400e" stroke-width="2.5"/>
  
  <!-- Pulzujúce jadro (Vnútri komory) -->
  <rect x="42" y="34" width="16" height="40" rx="4" fill="#f97316" filter="url(#coreGlow)">
    <animate attributeName="fill" values="#ea580c;#fbbf24;#ef4444;#ea580c" dur="1.5s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.4;1;0.4" dur="0.75s" repeatCount="indefinite" />
  </rect>

  <!-- Rozžeravené indukčné cievky pred jadrom -->
  <g stroke="url(#coilGrad)" stroke-width="2" stroke-linecap="round">
    <path d="M40 40H60">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="1s" repeatCount="indefinite" />
    </path>
    <path d="M40 50H60">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="1s" repeatCount="indefinite" begin="0.25s" />
    </path>
    <path d="M40 60H60">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="1s" repeatCount="indefinite" begin="0.5s" />
    </path>
    <path d="M40 70H60">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="1s" repeatCount="indefinite" begin="0.75s" />
    </path>
  </g>

  <!-- Ochranná mriežka komory -->
  <rect x="38" y="30" width="24" height="48" rx="6" fill="none" stroke="#334155" stroke-width="0.8" stroke-dasharray="3 3"/>

  <!-- Horná ventilačná turbína (odsávanie tepla) -->
  <circle cx="50" cy="18" r="16" fill="#0f172a" stroke="#475569" stroke-width="2.5"/>
  <g>
    <!-- Lopatky ventilátora -->
    <path d="M50 6V30M38 18H62M41 9L59 27M59 9L41 27" stroke="#64748b" stroke-width="4" stroke-linecap="round"/>
    <animateTransform attributeName="transform" type="rotate" from="0 50 18" to="360 50 18" dur="0.5s" repeatCount="indefinite" />
  </g>
  <circle cx="50" cy="18" r="5" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>

  <!-- Efekt sálajúceho tepla (Heat Shimmer Waves) -->
  <g opacity="0.8">
    <path d="M44 6Q50 -8 56 6" stroke="#f97316" stroke-width="2.5" stroke-linecap="round" fill="none">
      <animate attributeName="d" values="M44 6Q50 -8 56 6;M44 0Q50 -14 56 0;M44 6Q50 -8 56 6" dur="1.2s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="1;0;1" dur="1.2s" repeatCount="indefinite" />
    </path>
    <path d="M38 10Q50 -2 62 10" stroke="#fbbf24" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.6">
      <animate attributeName="d" values="M38 10Q50 -2 62 10;M38 2Q50 -10 62 2;M38 10Q50 -2 62 10" dur="1.5s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.8;0;0.8" dur="1.5s" repeatCount="indefinite" />
    </path>
  </g>

  <!-- Predný diagnostický panel s digitálnym displejom -->
  <rect x="32" y="80" width="36" height="10" rx="2.5" fill="#0f172a" stroke="#334155" stroke-width="1.5"/>
  <rect x="35" y="82.5" width="30" height="5" rx="1" fill="#020617"/>
  <!-- Animovaný "graf" na displeji -->
  <path d="M36 85H38L39 83L41 86L43 84L45 85H47" stroke="#38bdf8" stroke-width="0.8" opacity="0.8">
    <animate attributeName="d" values="M36 85H38L39 83L41 86L43 84L45 85H47;M36 85H38L39 86L41 83L43 85L45 84H47;M36 85H38L39 83L41 86L43 84L45 85H47" dur="2s" repeatCount="indefinite" />
  </path>

  <!-- Status LED diódy -->
  <circle cx="36" cy="81" r="1.5" fill="#ef4444">
    <animate attributeName="opacity" values="1;0.2;1" dur="1.2s" repeatCount="indefinite" />
  </circle>
  <circle cx="50" cy="81" r="1.5" fill="#22c55e"/>
  <circle cx="64" cy="81" r="1.5" fill="#38bdf8">
    <animate attributeName="opacity" values="0.2;1;0.2" dur="2s" repeatCount="indefinite" />
  </circle>

  <!-- Priemyselné značenie (Hazard Stripes) -->
  <g opacity="0.5">
    <path d="M22 88L30 92M35 94L43 97M57 97L65 94M70 92L78 88" stroke="#fbbf24" stroke-width="3"/>
  </g>

  <!-- Externé silové káble prepojené s jadrom -->
  <path d="M20 58Q30 70 42 65M80 58Q70 70 58 65" stroke="#0f172a" stroke-width="3" stroke-linecap="round"/>
  <path d="M20 58Q30 70 42 65M80 58Q70 70 58 65" stroke="#f97316" stroke-width="0.8" stroke-opacity="0.5">
    <animate attributeName="stroke-opacity" values="0.2;0.8;0.2" dur="1s" repeatCount="indefinite" />
  </path>

  <!-- Mechanické nity na konštrukcii -->
  <g fill="#475569">
    <circle cx="14" cy="38" r="1.2"/>
    <circle cx="86" cy="38" r="1.2"/>
    <circle cx="14" cy="78" r="1.2"/>
    <circle cx="86" cy="78" r="1.2"/>
    <circle cx="50" cy="92" r="1.2"/>
  </g>
</svg>