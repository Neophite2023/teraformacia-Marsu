<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="drillMetal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#64748b" />
      <stop offset="50%" style="stop-color:#334155" />
      <stop offset="100%" style="stop-color:#1e293b" />
    </linearGradient>
    <filter id="drillGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Masívna základňa (Heavy Foundation) -->
  <rect x="15" y="75" width="70" height="18" rx="4" fill="url(#drillMetal)" stroke="#0f172a" stroke-width="2"/>
  <path d="M20 75L25 70H75L80 75" fill="#1e293b" stroke="#0f172a" stroke-width="1.5"/>

  <!-- Výstražné pruhy (Hazard Stripes) -->
  <g opacity="0.6">
    <path d="M20 85L25 80M35 85L40 80M50 85L55 80M65 85L70 80" stroke="#fbbf24" stroke-width="4"/>
  </g>

  <!-- Hydraulické piesty (Side Pistons) -->
  <g>
    <rect x="22" y="50" width="8" height="25" fill="#475569" stroke="#0f172a"/>
    <rect x="24" y="55" width="4" height="15" fill="#94a3b8">
      <animate attributeName="height" values="15;5;15" dur="1.5s" repeatCount="indefinite" />
    </rect>
    <rect x="70" y="50" width="8" height="25" fill="#475569" stroke="#0f172a"/>
    <rect x="72" y="55" width="4" height="15" fill="#94a3b8">
      <animate attributeName="height" values="15;5;15" dur="1.5s" repeatCount="indefinite" begin="0.7s" />
    </rect>
  </g>

  <!-- Hlavné telo vrtáka (Housing) -->
  <rect x="35" y="25" width="30" height="45" rx="2" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <rect x="40" y="30" width="20" height="10" fill="#020617"/>
  <rect x="42" y="32" width="16" height="6" fill="#0ea5e9" opacity="0.6">
    <animate attributeName="opacity" values="0.2;1;0.2" dur="2s" repeatCount="indefinite" />
  </rect>

  <!-- Rotačná vrtná hlava (Animated Drill Bit) -->
  <g transform="translate(50, 75)">
    <path d="M-12 0L0 20L12 0H-12Z" fill="#94a3b8" stroke="#1e293b" stroke-width="1.5"/>
    <g stroke="#334155" stroke-width="1.5">
      <path d="M-10 4L10 4M-8 10L8 10M-4 16L4 16">
        <animate attributeName="d" 
          values="M-10 4L10 4;M-10 16L10 16;M-10 4L10 4" 
          dur="0.2s" repeatCount="indefinite" />
      </path>
    </g>
  </g>

  <!-- Externé potrubie -->
  <path d="M65 45C80 45 85 60 85 75" stroke="#334155" stroke-width="3" stroke-linecap="round" fill="none"/>
  <circle cx="85" cy="75" r="3" fill="#475569"/>
</svg>